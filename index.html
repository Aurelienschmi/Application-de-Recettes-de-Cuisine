<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recettes</title>
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                <img src="./assets/meal-svgrepo-com.svg" alt="Logo du site">
            </div>
            <div class="liens">
                <a href="index.html">← Retour aux recettes</a>
                <a href="favoris.html">Mes Favoris</a>
            </div>
        </nav>
    </header>

    <div class="BDR">
      <div class="Rechereche">
        <div class="BarRecherche">
          <input
            type="text"
            id="search-input"
            placeholder="Rechercher une recette..."
            autocomplete="off"
          />
        </div>
        <div class="Filtre">
          <select id="filter-category" autocomplete="off">
            <option value="">Toutes les catégories</option>
          </select>
          <select id="filter-difficulty" autocomplete="off">
            <option value="">Toutes les difficultés</option>
            <option value="Easy">Facile</option>
            <option value="Medium">Moyen</option>
            <option value="Hard">Difficile</option>
          </select>
          <select id="filter-time" autocomplete="off">
            <option value="">Tous les temps</option>
            <option value="30">Moins de 30 min</option>
            <option value="60">Moins de 60 min</option>
            <option value="90">Moins de 90 min</option>
          </select>
        </div>
      </div>
      <div class="Navigation"></div>
    </div>

    <main>
      <div class="results-header">
        <h2 id="results-count"><strong>0</strong> recettes</h2>
      </div>
      <div id="recipes-grid"></div>
    </main>

    <script src="./js/api.js"></script>
    <script src="./js/index.js"></script>
  </body>
</html>
